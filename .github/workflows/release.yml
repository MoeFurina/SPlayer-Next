# 打 tag（v*）触发发版构建并发布到 GitHub 草稿 Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: 22.x

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            build_cmd: pnpm build:win -- --x64 --publish always
          - os: macos-latest
            name: macOS-arm64
            build_cmd: pnpm build:mac -- --arm64 --publish always
          - os: macos-latest
            name: macOS-x64
            build_cmd: pnpm build:mac -- --x64 --publish always
          - os: ubuntu-latest
            name: linux
            build_cmd: pnpm build:linux -- --x64 --publish always
    steps:
      - name: Check out git repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "native/audio-engine -> target\nnative/media-ctrl -> target"

      # 校验 tag 与 package.json 版本一致（仅 tag 触发时）
      - name: Verify tag matches version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "标签 $GITHUB_REF_NAME 与 package.json 版本 $PKG_VERSION 不一致"
            exit 1
          fi

      # Linux: 安装系统构建/打包依赖
      - name: 安装系统依赖 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libasound2-dev libdbus-1-dev pkg-config clang \
            rpm libarchive-tools

      # 清理旧构建产物
      - name: Clean workspace on Windows
        if: runner.os == 'Windows'
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          if (Test-Path out) { Remove-Item -Recurse -Force out }

      - name: Clean workspace on macOS & Linux
        if: runner.os != 'Windows'
        run: rm -rf dist out

      # CI 不需要国内镜像
      - name: 移除 .npmrc
        shell: bash
        run: rm -f .npmrc

      # 安装项目依赖
      - name: Install dependencies
        run: pnpm install

      # 构建并发布到 GitHub 草稿 Release（含 latest*.yml + blockmap 差量元数据）
      - name: Build & publish ${{ matrix.name }}
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
